  <!DOCTYPE html>
  <html lang="ja">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お支払い完了 - スマレジコネクター</title>
  <style>
    body { font-family: -apple-system, sans-serif; text-align: center; padding: 60px 20px; background: #fff; color: #202124; }
    .checkmark {
      width: 80px; height: 80px; border-radius: 50%;
      background: #005A8E;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      animation: scaleIn 0.3s ease;
    }
    .checkmark svg {
      width: 48px; height: 48px;
      stroke: white; stroke-width: 3;
      stroke-linecap: round; stroke-linejoin: round; fill: none;
      animation: draw 0.5s ease 0.3s forwards;
      stroke-dasharray: 100; stroke-dashoffset: 100;
    }
    @keyframes scaleIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    h1 { font-size: 22px; font-weight: 700; color: #005A8E; margin-bottom: 12px; }
    p { color: #5f6368; font-size: 15px; line-height: 1.7; }
  </style>
  </head>
  <body>
    <div class="checkmark">
      <svg viewBox="0 0 52 52"><polyline points="14,27 22,35 38,19"/></svg>
    </div>
    <h1>お支払いが完了しました</h1>
    <p>このタブを閉じて、スプレッドシートのサイドバーに戻ってください。<br>プランが有効になるまで少々お待ちください。</p>
  </body>
  </html>
