  <!DOCTYPE html>
  <html lang="ja">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>キャンセル - スマレジコネクター</title>
  <style>
    body { font-family: -apple-system, sans-serif; text-align: center; padding: 60px 20px; background: #fff; color: #202124; }
    .icon-circle {
      width: 80px; height: 80px; border-radius: 50%;
      background: #8e8e93;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      animation: scaleIn 0.3s ease;
    }
    .icon-circle svg {
      width: 44px; height: 44px;
      stroke: white; stroke-width: 3;
      stroke-linecap: round; stroke-linejoin: round; fill: none;
    }
    @keyframes scaleIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    h1 { font-size: 22px; font-weight: 700; color: #5f6368; margin-bottom: 12px; }
    p { color: #5f6368; font-size: 15px; line-height: 1.7; }
  </style>
  </head>
  <body>
    <div class="icon-circle">
      <svg viewBox="0 0 52 52"><polyline points="22 16 15 23 22 30"/><path d="M15 23 H32 a6 6 0 0 1 6 6 v3"/></svg>
    </div>
    <h1>お支払いがキャンセルされました</h1>
    <p>このタブを閉じて、サイドバーから再度お試しください。</p>
  </body>
  </html>
